<form class="task-add-form" (ngSubmit)="add()">
  <input
    pInputText
    type="text"
    placeholder="Новая задача..."
    [ngModel]="newTitle()"
    (ngModelChange)="newTitle.set($event)"
    name="newTitle"
  />
  <p-datepicker
    [ngModel]="dueDate()"
    (ngModelChange)="dueDate.set($event)"
    name="dueDate"
    [showTime]="true"
    [showIcon]="true"
    placeholder="Дата и время"
    dateFormat="dd.mm.yy"
    hourFormat="24"
  />
  <p-button type="submit" icon="pi pi-plus" label="Добавить" />
</form>
