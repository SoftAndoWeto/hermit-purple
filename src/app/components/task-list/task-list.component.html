<div class="task-list">
  <h2 class="task-list__title">Задачи</h2>

  <hp-task-add-form />

  @if (store.tasks().length === 0) {
    <p class="task-list__empty">Задач пока нет</p>
  } @else {
    <ul class="task-list__items" (click)="onListClick($event)">
      @for (task of store.tasks(); track task.id) {
        <li class="task-list__item"
            [class.task-list__item--completed]="task.completed"
            [attr.data-task-id]="task.id">
          <p-checkbox
            [binary]="true"
            [ngModel]="task.completed"
            (ngModelChange)="store.toggleTask(task.id)"
          />
          <div class="task-list__item-info">
            <span class="task-list__item-title">{{ task.title }}</span>
            @if (task.dueDate) {
              <span class="task-list__item-due" [class.task-list__item-due--overdue]="task.dueDate < now">
                <i class="pi pi-clock"></i>
                {{ task.dueDate | date: 'dd.MM.yyyy HH:mm' }}
              </span>
            }
          </div>
          <p-button
            data-action="delete"
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            [rounded]="true"
            size="small"
          />
        </li>
      }
    </ul>
  }
</div>
